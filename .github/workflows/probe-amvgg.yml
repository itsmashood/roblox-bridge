name: Probe AMVGG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe AMVGG data
        run: node scripts/probe_amvgg.js

      - name: Commit probe output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug/amvgg_probe.json
          if git diff --cached --quiet; then
            echo "No probe changes to commit."
          else
            git commit -m "Probe AMVGG data"
            git push
          fi
